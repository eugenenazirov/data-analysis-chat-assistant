persona_tone: "direct, concise, executive-friendly, with clear business implications"
persona_version: "prototype-config-v1"
golden_trios_path: "data/golden_trios.jsonl"

bigquery:
  location: "US"
  dataset: "bigquery-public-data.thelook_ecommerce"
  allowed_tables:
    - orders
    - order_items
    - products
    - users
  max_bytes_billed: 200000000
  timeout_seconds: 60
  max_result_rows: 100
  job_label_app: "retail-agent"

qdrant:
  url: "http://localhost:6333"
  collection: "golden_trios"
  timeout_seconds: 30
  top_k: 3

model:
  llm_model: "google-cloud:gemini-2.5-flash"
  embedding_provider: "gemini"
  embedding_model: "gemini-embedding-001"
  max_sql_retries: 2
  max_history_turns: 6
  max_history_bytes: 65536
  temperature: 0.1

safety:
  pii_columns:
    - email
    - phone
    - phone_number
    - customer_email
    - customer_phone
    - first_name
    - last_name
    - street_address
    - postal_code
    - zip
    - latitude
    - longitude
    - user_geom
  safe_columns_by_table:
    orders:
      - order_id
      - user_id
      - status
      - gender
      - created_at
      - returned_at
      - shipped_at
      - delivered_at
      - num_of_item
    order_items:
      - id
      - order_id
      - user_id
      - product_id
      - inventory_item_id
      - status
      - created_at
      - shipped_at
      - delivered_at
      - returned_at
      - sale_price
    products:
      - id
      - cost
      - category
      - name
      - brand
      - retail_price
      - department
      - sku
      - distribution_center_id
    users:
      - id
      - age
      - gender
      - state
      - city
      - country
      - traffic_source
      - created_at
  blocked_sql_keywords:
    - alter
    - create
    - delete
    - drop
    - insert
    - merge
    - truncate
    - update

observability:
  log_path: "logs/agent-runs.jsonl"
  enable_logfire: false

users:
  manager_a:
    display_name: "Manager A"
    preferred_format: "table"
    tone: "concise, quantitative, comparison-heavy"
  manager_b:
    display_name: "Manager B"
    preferred_format: "bullets"
    tone: "brief, plain-language, action-oriented"
  ceo:
    display_name: "CEO"
    preferred_format: "brief"
    tone: "strategic, concise, focused on business implications"
