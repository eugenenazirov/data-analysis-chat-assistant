name: Live answer-quality candidate

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      tier:
        description: "Canary, or a frozen release candidate for later analyst approval"
        required: true
        default: canary
        type: choice
        options:
          - canary
          - release-candidate

permissions:
  contents: read
  id-token: write

concurrency:
  group: live-quality-${{ github.ref }}-${{ github.event_name == 'schedule' && 'canary' || inputs.tier }}
  cancel-in-progress: false

jobs:
  evaluate:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: quality-live-evaluation
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333
    env:
      EVAL_TIER: ${{ github.event_name == 'schedule' && 'canary' || inputs.tier }}
      EMBEDDING_PROVIDER: gemini
      LLM_MODEL: google-cloud:gemini-3.5-flash
      BQ_MAX_BYTES_BILLED: "50000000"
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION }}
      GOOGLE_CLOUD_LLM_LOCATION: global
      GOOGLE_CLOUD_EMBEDDING_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION }}
      QDRANT_URL: http://localhost:6333
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Authenticate to Google APIs with federated identity
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install Python and frozen dependencies
        run: |
          uv python install
          uv sync --frozen --all-groups
          uv pip check

      - name: Index approved Golden Knowledge
        run: uv run python -m retail_agent index-golden --recreate

      - name: Verify chart runtime before model evaluation
        run: uv run python -m retail_agent chart-smoke

      - name: Select bounded evaluation tier
        id: tier
        run: |
          mkdir -p artifacts
          if [[ "$EVAL_TIER" == "release-candidate" ]]; then
            cp evals/datasets/smoke.jsonl artifacts/release-cases.jsonl
            sed -e '$a\' evals/datasets/release_holdout.jsonl >> artifacts/release-cases.jsonl
            echo "cases=artifacts/release-cases.jsonl" >> "$GITHUB_OUTPUT"
            echo "repetitions=5" >> "$GITHUB_OUTPUT"
            echo "report=artifacts/quality-eval-live-release.json" >> "$GITHUB_OUTPUT"
          else
            echo "cases=evals/datasets/smoke.jsonl" >> "$GITHUB_OUTPUT"
            echo "repetitions=3" >> "$GITHUB_OUTPUT"
            echo "report=artifacts/quality-eval-live-canary.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bounded live evaluation
        run: >-
          uv run python -m evals.run quality
          --mode live
          --automated-only
          --cases "${{ steps.tier.outputs.cases }}"
          --repetitions "${{ steps.tier.outputs.repetitions }}"
          --output "${{ steps.tier.outputs.report }}"

      - name: Create frozen analyst review packet
        if: env.EVAL_TIER == 'release-candidate'
        run: >-
          uv run python -m evals.run human-review-form
          --report "${{ steps.tier.outputs.report }}"
          --cases "${{ steps.tier.outputs.cases }}"
          --seed "${{ github.sha }}-${{ github.run_id }}"
          --form-output artifacts/human-review-form.json
          --pairwise-output artifacts/human-pairwise-form.json
          --key-output artifacts/human-review-key.json

      - name: Record candidate provenance and file digests
        env:
          REPORT_PATH: ${{ steps.tier.outputs.report }}
        run: |
          uv run python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          artifact_dir = Path("artifacts")
          files = sorted(path for path in artifact_dir.iterdir() if path.is_file())
          metadata = {
              "tier": os.environ["EVAL_TIER"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "head_sha": os.environ["GITHUB_SHA"],
              "run_id": int(os.environ["GITHUB_RUN_ID"]),
              "run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "report": os.environ["REPORT_PATH"],
              "files": {
                  path.name: hashlib.sha256(path.read_bytes()).hexdigest() for path in files
              },
          }
          (artifact_dir / "candidate-metadata.json").write_text(
              json.dumps(metadata, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Upload immutable evaluation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: live-eval-${{ env.EVAL_TIER }}-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: ${{ env.EVAL_TIER == 'release-candidate' && 90 || 14 }}
