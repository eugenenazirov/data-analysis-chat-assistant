name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python
        run: uv python install

      - name: Verify lockfile
        run: uv lock --check

      - name: Sync frozen environment
        run: uv sync --frozen --all-groups

      - name: Verify installed dependencies
        run: uv pip check

      - name: Run complete offline verification
        run: |
          uv run ruff check .
          uv run pytest --cov=retail_agent --cov-branch --cov-report=term-missing --cov-report=xml --cov-fail-under=85
          uv run python -m evals.datasets.build_replay_fixtures --check
          uv run python -m evals.run validate-dataset
          uv run python -m evals.run validate-dataset --cases evals/datasets/release_holdout.jsonl
          uv run python -m evals.run validate-dataset --cases evals/datasets/multi_turn.jsonl
          uv run python -m evals.run validate-dataset --cases evals/datasets/development.jsonl
          uv run python -m evals.run validate-dataset --cases evals/datasets/adversarial.jsonl
          uv run python -m evals.run validate-dataset --cases evals/datasets/regression.jsonl
          uv run python -m evals.run guardrails
          uv run python -m evals.run quality --mode replay
          uv run python -m evals.run quality --mode replay --cases evals/datasets/release_holdout.jsonl --automated-only
          uv run python -m evals.run quality --mode replay --cases evals/datasets/multi_turn.jsonl --automated-only
          uv run python -m evals.run quality --mode replay --cases evals/datasets/development.jsonl --automated-only
          uv run python -m evals.run quality --mode replay --cases evals/datasets/adversarial.jsonl --automated-only
          uv run python -m evals.run quality --mode replay --cases evals/datasets/regression.jsonl --automated-only

      - name: Compile package
        run: uv run python -m compileall -q retail_agent evals

      - name: Verify dependency files remain unchanged
        run: git diff --exit-code -- pyproject.toml uv.lock

      - name: Build frozen Docker image
        run: docker build --target runtime --tag retail-agent:ci .

      - name: Verify runtime image excludes evaluations
        run: |
          docker run --rm --entrypoint python retail-agent:ci -c "import importlib.util, pathlib; assert importlib.util.find_spec('pydantic_evals') is None; assert not pathlib.Path('/app/evals').exists()"
          docker run --rm retail-agent:ci chart-smoke

      - name: Build and smoke-test evaluation image
        run: |
          docker build --target evaluation --tag retail-agent-eval:ci .
          docker run --rm retail-agent-eval:ci guardrails
          docker run --rm retail-agent-eval:ci quality --mode replay
          docker run --rm retail-agent-eval:ci quality --mode replay --cases evals/datasets/regression.jsonl --automated-only
