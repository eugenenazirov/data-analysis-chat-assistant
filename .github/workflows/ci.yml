name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python
        run: uv python install

      - name: Verify lockfile
        run: uv lock --check

      - name: Sync frozen environment
        run: uv sync --frozen --all-groups

      - name: Verify installed dependencies
        run: uv pip check

      - name: Lint
        run: uv run ruff check .

      - name: Test with branch coverage
        run: >-
          uv run pytest
          --cov=retail_agent
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=85

      - name: Run guardrail evaluations
        run: uv run python -m retail_agent eval

      - name: Run answer-quality replay evaluations
        run: uv run python -m retail_agent eval --suite quality --mode replay

      - name: Compile package
        run: uv run python -m compileall -q retail_agent

      - name: Verify dependency files remain unchanged
        run: git diff --exit-code -- pyproject.toml uv.lock

      - name: Build frozen Docker image
        run: docker build --tag retail-agent:ci .
